</p><p><strong>流注</strong></p><p><strong>Influx</strong></p><p><strong></p><p>当相信自然的人看到这些动物或昆虫如何在地上或植物的叶子上产生时，当他们检查它们生物体中的奇妙事物和以它们的手段所制造的事物时，他们认为是自然界产生了它们；殊不知，它们的形成和复苏来自灵界，而它们的接受和衣服来自自然界；此外，在春夏时节，太阳的热会溶解更纯净的自然界的粒子，使它们适应接受流注和穿衣的过程。因此，相信自然的人由此获得的这种论证和确认对我来说，就是对灵界进入自然界的持续流注的论证和确认。</p><p>注：写于1750年。本书所描述的毛毛虫变成蝴蝶、蜜蜂的管理和其它许多事都是这种流注的明显标志。可参看《天堂与地狱》567节，以及39, 108, 109节。</p>
